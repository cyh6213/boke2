baseURL = 'https://cyh6213.github.io'
defaultContentLanguage = 'zh'
languageCode = 'zh-CN'
hasCJKLanguage = true
title = "程愚瀚 的博客"
theme = 'PaperMod'

[params]
  author = "程愚瀚"
  description = "记录技术成长与生活感悟"
  defaultTheme = 'auto'
  ShowToc = true
  ShowReadingTime = true
  ShowWordCount = true
  ShowCodeCopyButtons = true
  ShowRelatedPosts = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  comments = true
  mainSections = ["posts", "projects"]

  [params.homeInfoParams]
    Title = "欢迎来到我的博客"

[menu]
  [[menu.main]]
    name = '首页'
    url = '/'
    weight = 1
  [[menu.main]]
    name = '项目'
    url = '/projects/'
    weight = 2
  [[menu.main]]
    name = '文章'
    url = '/posts/'
    weight = 3
  [[menu.main]]
    name = '关于我'
    url = '/about/'
    weight = 4

[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
