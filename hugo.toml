baseURL = ''
defaultContentLanguage = 'zh'
languageCode = 'zh-CN'
hasCJKLanguage = true
title = "XieJava 的博客"
theme = 'PaperMod'

[params]
  author = "XieJava"
  description = "记录技术成长与生活感悟"
  defaultTheme = 'auto'
  ShowToc = true
  ShowReadingTime = true
  ShowWordCount = true
  ShowCodeCopyButtons = true
  ShowRelatedPosts = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  comments = true

  [params.homeInfoParams]
    Title = "欢迎来到我的博客"
    Content = '记录学习与生活'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/xiejava'

[menu]
  [[menu.main]]
    name = '首页'
    url = '/'
    weight = 1
  [[menu.main]]
    name = '归档'
    url = '/archives/'
    weight = 2
  [[menu.main]]
    name = '分类'
    url = '/categories/'
    weight = 3
  [[menu.main]]
    name = '标签'
    url = '/tags/'
    weight = 4
  [[menu.main]]
    name = '关于'
    url = '/about/'
    weight = 5
  [[menu.main]]
    name = '搜索'
    url = '/search/'
    weight = 6

[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
